<body class="bg-light">

                {name: "Aarti",branch: "AI", cgpa: 9.0},
                {name: "Anita",branch: "AI", cgpa: 8.9},
                {name: "Agrima",branch: "AI", cgpa: 8.4},
                {name: "Bhoomi",branch: "AI", cgpa: 9.4},

                    {name: "aditi",branch: "AI", cgpa: 8.4},
                     {name: "Ankita",branch: "AI", cgpa: 7.4},




            ];
            
            let html ="";
            for(let i=0; i<students.length; i++){
                html+= `
                <div class="col-md-4 card-item">
                    <div class="card shadow">
                        <div class="card-body">
                            <h4>${students[i].name}</h4>
                            <button class="btn btn-primary btn-sm mt-2">
                                show Details
                                </button>
                                <div class="details mt-3"style="display:none;">
                                    <p><strong>Branch:</strong> ${students[i].branch}</p>
                                    <p><strong>cgpa:</strong> ${students[i].cgpa}</p>
                                    </div>
                                    </div>
                                    </div>
                                    </div>
                                  `  ;
                                }
                                document.getElementById("container").innerHTML=html;
                            
    $(document).on("click",".btn",function(){
        $(this).next(".details").slideToggle();

    });
    $("#search").keyup(function(){
        let value=$(this).val();
        $(".card").each(function(){
            let name=$(this).find("h4").text();
            if(name.includes(value)){
                $(this).show();
            }
        });
    });

    }

        
        
    

    
</script>
